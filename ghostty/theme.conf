# theme.conf — the one base 16-slot ANSI palette (deep blue-black ground,
# accents pushed brighter/more saturated than a solid-bg theme would need so
# they survive the 0.5-opacity translucent background). starship, fzf, bat,
# and fast-syntax-highlighting all reference ANSI slot names and inherit this
# palette for free. Replaces the previous `theme = deep` named theme.
#
# Reserved meanings: slot 9 (#ff7a85) is the dangerous-context alarm red used
# by the starship ☸ prod tier; the starship Work work-box rust (#c05a5a) is
# deliberately NOT in the palette so the two reds never collapse together.

background = #0e1420
foreground = #c8d3e0

palette = 0=#1a2230
palette = 1=#e06c75
palette = 2=#8fce7a
palette = 3=#e5c07b
palette = 4=#61afef
palette = 5=#c678dd
palette = 6=#56c8d8
palette = 7=#c8d3e0
palette = 8=#3a4661
palette = 9=#ff7a85
palette = 10=#a9e18f
palette = 11=#f2d08a
palette = 12=#7cc0ff
palette = 13=#d99aef
palette = 14=#6fe0f0
palette = 15=#eef2f8
