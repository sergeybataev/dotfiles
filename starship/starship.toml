"$schema" = 'https://starship.rs/config-schema.json'

# ${custom.work} must lead the line (it's the work-identity tell), so custom
# modules are referenced individually — a bare $custom would render the work
# box a second time in place.
format = """
${custom.work}\
$directory\
$git_branch\
$git_status\
$golang\
$kubernetes\
${custom.ai_manual}\
${custom.ai_auto}\
${custom.mise}
$character"""

# Shared walk-up logic used by both custom.mise.when and custom.mise.command:
# starting at $PWD, climb toward $HOME/"/" looking for a project-level mise
# config (mise.toml / .mise.toml / .tool-versions). Pure POSIX parameter
# expansion (no dirname/basename forks, no `mise` invocation — too slow to
# run on every prompt).

right_format = """$cmd_duration"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold bright-cyan"

[git_branch]
symbol = " "
style = "bold bright-purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold bright-yellow"
format = "([$all_status$ahead_behind]($style)) "

[golang]
symbol = " "
style = "bold bright-cyan"
format = "[$symbol($version )]($style)"

# Always-on (renders whenever a current-context resolves), context + namespace
# only — no kubeconfig-file display. Three severity tiers by context name:
# color = severity of the target; the delete/drain/cordon guard in kube.zsh is
# a blanket non-homelab net regardless of tier, so a blue dev context is still
# guarded — deliberately do NOT redden all non-homelab contexts here.
[kubernetes]
disabled = false
symbol = "☸ "
style = "bold bright-blue"          # default tier: dev / homelab / other
format = "[$symbol$context( \\($namespace\\))]($style) "

# NOTE: no (?i) — the mise-pinned starship 1.26.0 build lacks regex
# unicode-case, so (?i) fails to compile and the tier silently drops.
# Context names here are lowercase anyway (kubectl config get-contexts).
[[kubernetes.contexts]]
context_pattern = ".*prod.*"
style = "bold #ff7a85"              # bright alarm red — distinct from the rust work box

[[kubernetes.contexts]]
context_pattern = ".*stag.*"        # matches staging / stage
style = "bold #f2d08a"              # amber caution tier

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style)"

# Work-identity tell: a filled rust-red box (labeled $WORK_LABEL) leading the
# prompt, ONLY under */$WORK_ORG/* (same cwd test as ai.zsh / custom.ai_auto).
# WORK_ORG/WORK_LABEL are exported by the untracked ~/.zsh/work.zsh and inherited
# by the `sh` that runs the command/when below; if WORK_ORG is unset the box
# simply never renders. Personal trees show nothing — the box is the whole tell;
# ❯ and directory keep base colors in both zones. This IS the identity segment:
# rust #c05a5a fill is deliberately muted/distinct from the bright #ff7a85
# dangerous-context red used by the ☸ prod tier (box leads the line, ☸ red
# appears mid-line).
[custom.work]
command = 'printf "%s" "${WORK_LABEL:-Work}"'
when = 'test -n "$WORK_ORG" && case "$PWD" in */"$WORK_ORG"/*) exit 0 ;; *) exit 1 ;; esac'
shell = ["sh", "--norc"]
format = "[ $output ]($style) "
style = "bold fg:#eef2f8 bg:#c05a5a"
disabled = false

# Active AI assistant indicator (mirrors the routing in ~/.zsh/ai.zsh).
# Two variants so the style can differ; only one is ever non-empty:
#   - custom.ai_manual: $AI_ASSISTANT session override set -> bold bright-yellow
#   - custom.ai_auto:   no override, cwd-computed default    -> plain (non-bold,
#     non-dim) yellow — same hue as the override so it still reads as "AI
#     assistant", but the missing bold is what marks it as the secondary/auto
#     state. `dimmed` was dropped: on a translucent terminal background it
#     washed out to near-invisible, which defeated the point of showing it.
# Both commands are pure shell builtins (case/printf), no external process spawns.

[custom.ai_manual]
command = 'printf "%s" "$AI_ASSISTANT"'
when = '[ -n "$AI_ASSISTANT" ]'
shell = ["sh", "--norc"]
format = "[🤖 $output]($style) "
style = "bold bright-yellow"
disabled = false

[custom.ai_auto]
command = '''
case "$PWD" in
  */"$WORK_ORG"/*) [ -n "$WORK_ORG" ] && printf "claude" || printf "codex" ;;
  *) printf "codex" ;;
esac
'''
when = '[ -z "$AI_ASSISTANT" ]'
shell = ["sh", "--norc"]
format = "[🤖 $output]($style) "
style = "yellow"
disabled = false

# Active mise project-config indicator: prints the basename of the nearest
# ancestor directory (walking up from $PWD toward $HOME) that has its own
# mise.toml / .mise.toml / .tool-versions, e.g. the org dir name when under
# ~/go/src/github.com/<org>/mise.toml. Bold bright-green when found. Prints
# nothing when no project config exists anywhere up to $HOME — chosen over
# a dim "mise" fallback for cleanliness (most dirs have no project config,
# and a fallback label would be noise most of the time). Icon: ⚙ (distinct
# from ☸ kubernetes and 🤖 ai). `when` runs the identical walk and exits
# non-zero immediately if nothing is found, so the module is skipped
# without ever rendering an empty segment.
[custom.mise]
when = '''
dir="$PWD"
while true; do
  if [ -f "$dir/mise.toml" ] || [ -f "$dir/.mise.toml" ] || [ -f "$dir/.tool-versions" ]; then
    exit 0
  fi
  if [ "$dir" = "$HOME" ] || [ "$dir" = "/" ]; then
    exit 1
  fi
  dir="${dir%/*}"
  [ -z "$dir" ] && dir="/"
done
'''
command = '''
dir="$PWD"
while true; do
  if [ -f "$dir/mise.toml" ] || [ -f "$dir/.mise.toml" ] || [ -f "$dir/.tool-versions" ]; then
    printf "%s" "${dir##*/}"
    exit 0
  fi
  if [ "$dir" = "$HOME" ] || [ "$dir" = "/" ]; then
    exit 1
  fi
  dir="${dir%/*}"
  [ -z "$dir" ] && dir="/"
done
'''
shell = ["sh", "--norc"]
format = "[⚙ $output]($style) "
style = "bold bright-green"
disabled = false
